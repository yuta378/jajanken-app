<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>じゃんけんアプリ</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="background-glow"></div>
	<div class="stage-light"></div>

	<!-- Home Screen -->
	<div id="homeScreen" class="home-screen">
		<div class="home-container">
			<h1 class="home-title">じゃんけん</h1>
			<button id="gameStartBtn" class="game-start-btn">ゲームスタート</button>
		</div>
	</div>

	<!-- Game Screen -->
	<div id="gameScreen" class="game-screen" style="display: none;">
		<h1>じゃんけんバトル</h1>
		<p class="subtitle">テレビエンディング風 3D じゃんけんショー</p>
		<div id="app">
		<div class="online-panel" aria-label="オンライン対戦設定">
			<div class="panel-title">オンライン対戦 (無料: Firebase)</div>
			<div class="register-controls">
				<input id="playerNameInput" type="text" maxlength="16" placeholder="ユーザー名 (1〜16文字)" aria-label="ユーザー名">
				<button id="registerBtn" class="room-btn">登録/更新</button>
			</div>
			<div class="login-controls">
				<select id="loginUserSelect" aria-label="登録済みユーザー一覧"></select>
				<button id="loginBtn" class="room-btn">このユーザーでログイン</button>
			</div>
			<p id="profileStatus" class="room-status" aria-live="polite">ユーザー名を登録してください。</p>
			<p id="pointStatus" class="room-status">現在ポイント: 0</p>
			<button id="deleteUserBtn" class="room-btn delete-user-btn" disabled>ユーザー削除</button>
			<hr class="panel-divider">
			<div class="room-controls">
				<input id="roomIdInput" type="number" min="1" max="9" maxlength="1" placeholder="ルームID (1〜9)" aria-label="ルームID">
				<button id="createRoomBtn" class="room-btn">ルーム作成</button>
				<button id="joinRoomBtn" class="room-btn">参加</button>
				<button id="leaveRoomBtn" class="room-btn leave-btn" disabled>退出</button>
			</div>
			<p id="roomStatus" class="room-status" aria-live="polite">ルームを作成または参加してください。</p>
			<hr class="panel-divider">
			<div class="matchmaking-controls">
				<button id="matchmakingBtn" class="room-btn match-btn">🎮 マッチング</button>
				<button id="cancelMatchBtn" class="room-btn cancel-btn" disabled>キャンセル</button>
			</div>
			<p id="matchStatus" class="room-status" aria-live="polite"></p>
			<hr class="panel-divider">
			<button id="rankingBtn" class="room-btn ranking-btn">🏆 ランキング</button>
		</div>
		<div id="rankingModal" class="ranking-modal" style="display: none;">
			<div class="ranking-content">
				<div class="ranking-header">
					<h2>ランキング</h2>
					<button id="closeRankingBtn" class="close-ranking-btn">✕</button>
				</div>
				<div id="rankingList" class="ranking-list"></div>
			</div>
		</div>
		<div class="arena">
			<div class="hand-card" id="playerHand">
				<div class="card-label" id="playerLabel">あなた</div>
				<div class="fighter player" aria-hidden="true">
					<span class="head"></span>
					<span class="body"></span>
					<span class="arm"></span>
					<span class="hand-shape" id="playerShape">?</span>
				</div>
				<div class="choice-text" id="playerChoiceText">?</div>
			</div>
			<div class="vs">VS</div>
			<div class="hand-card" id="computerHand">
				<div class="card-label" id="opponentLabel">対戦相手</div>
				<div class="fighter computer" aria-hidden="true">
					<span class="head"></span>
					<span class="body"></span>
					<span class="arm"></span>
					<span class="hand-shape" id="computerShape">?</span>
				</div>
				<div class="choice-text" id="computerChoiceText">?</div>
			</div>
		</div>
		<div class="controls">
			<button id="rock" class="choice-btn rock-btn" aria-label="グー">✊ グー</button>
			<button id="scissors" class="choice-btn scissors-btn" aria-label="チョキ">✌️ チョキ</button>
			<button id="paper" class="choice-btn paper-btn" aria-label="パー">🖐️ パー</button>
		</div>
		<p id="result" aria-live="polite">ルームを作成/参加してバトル開始！</p>
		</div>
	</div>

	<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
	<script src="script.js"></script>
</body>
</html>
